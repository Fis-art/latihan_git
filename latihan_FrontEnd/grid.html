<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>materi Grid</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr ;
            grid-template-rows: 2fr 2fr 2fr 2fr ;
            column-gap: 20px ;
            row-gap: 20px ;

        }
        .box {
            padding-left: 8px;
            border: solid 2px black;
            min-height: 100px;
            width: 100%;
            font-style:inherit;
            font-size: 50px ;
        }



    </style>

</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
    </div>

</body>
</html>
